    <style>

        body {

            color: #ffffff;

            min-height: 100vh; 

            padding: 20px; 

            overflow: hidden; 

            position: relative; 

            font-family: 'Cairo', sans-serif;

        }

        

        @keyframes gradientBG {

            0% { background-position: 0% 50%; }

            50% { background-position: 100% 50%; }

            100% { background-position: 0% 50%; }

        }



        /* 📊 العداد العلوي */

        .total-followers-box {

            animation: fadeInTop 1s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards, elementPulse 3s infinite ease-in-out 1.6s;

        @keyframes elementPulse {

        .contact-item { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: #cccccc; text-decoration: none; transition: color 0.3s; }

        .contact-item span { font-family: 'Orbitron', sans-serif; font-weight: bold; }



        .total-followers-box .title { font-size: 0.8rem; color: #b3b3b3; display: block; font-weight: bold; }

        .total-followers-box .count { font-family: 'Orbitron', sans-serif; font-size: 1.35rem; font-weight: 900; color: #ff0000; text-shadow: 0 0 8px #ff0000; }



        @keyframes fadeInTop {

            from { opacity: 0; transform: translateY(-30px); }

            to { opacity: 1; transform: translateY(0); }

        /* 🌐 خطوط نيون الخلفية */

        .neon-lines {

            position: absolute;

            top: 0; left: 0; width: 100%; height: 100%;

                linear-gradient(to right, rgba(255, 0, 0, 0.03) 1px, transparent 1px),

                linear-gradient(to bottom, rgba(255, 0, 0, 0.03) 1px, transparent 1px);

            z-index: 0;

        }



        /* 🔺 الأجسام الهندسية الطائرة */

        .particles-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: 0; pointer-events: none; }

        .particle { position: absolute; border: 2px solid rgba(255, 0, 0, 0.2); box-shadow: 0 0 8px rgba(255, 0, 0, 0.2); opacity: 0; animation: floatParticle 9s linear infinite; }

        @keyframes floatParticle {

            0% { transform: translateY(110vh) rotate(0deg) scale(0.6); opacity: 0; }

            20% { opacity: 0.5; }

            80% { opacity: 0.5; }

            100% { transform: translateY(-10vh) rotate(360deg) scale(1.1); opacity: 0; }

        }

        

        /* ✍️ تكست الخلفية */

        .bg-username-marquee {

            position: absolute;

            width: 100%;

            white-space: nowrap;

            display: flex;

            overflow: hidden;

            pointer-events: none;

            user-select: none;

            z-index: 0;

            top: 45%;

            transform: translateY(-50%);

            opacity: 0.03;

            filter: blur(1px);

        }

        .marquee-content {

            display: inline-block;

            font-family: 'Orbitron', sans-serif;

            font-size: 14vw;

            font-weight: 900;

            color: transparent;

            -webkit-text-stroke: 2px #ff0000;

            letter-spacing: 15px;

            animation: marqueeMove 20s linear infinite;

        }

        @keyframes marqueeMove {

            0% { transform: translateX(0%); }

            100% { transform: translateX(-50%); }

        }

        

        /* 🔥 الصندوق الرئيسي */

            width: 100%; 

            max-width: 440px; 

            text-align: center; 

            z-index: 1; 

            background: rgba(8, 8, 8, 0.9); 

            padding: 40px 25px 30px 25px; 

            border-radius: 24px; 

            border: 1px solid rgba(255, 0, 0, 0.25); 

            backdrop-filter: blur(20px); 

            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.95);

            opacity: 0;

            transform: scale(0.85) translateY(40px);

            animation: containerUltimateSpawn 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;

            display: flex;

            flex-direction: column;

        }



        @keyframes containerUltimateSpawn {

            to { opacity: 1; transform: scale(1) translateY(0); }

        }



        /* أنميشن تدريجي مخصص للعناصر الداخلية بالصندوق عند الفتح */

        .profile-img-container, h1, .bio-container, .links-container {

            opacity: 0;

            transform: translateY(20px);

            animation: elementFadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;

        }

        .profile-img-container { animation-delay: 0.3s; }

        h1 { animation-delay: 0.45s; }

        .bio-container { animation-delay: 0.55s; } 

        .links-container { animation-delay: 0.75s; } 



        @keyframes elementFadeUp {

            to { opacity: 1; transform: translateY(0); }

        }



        /* 🖼️ أنيميشن الصورة الشخصية */

        .profile-img-container { 

            position: relative; 

            width: 135px; 

            height: 135px; 

            margin: 0 auto 25px auto; 

        }

        .profile-img-container::before {

            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 50%;

            background: linear-gradient(45deg, #ff0000, #330000, #ff0000); z-index: -1;

            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4); 

            transition: transform 0.4s ease, box-shadow 0.4s ease;

        }

        .profile-img { 

            width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; background: #111; 

            border: 3px solid rgba(15, 15, 15, 0.9);

            transition: transform 0.4s ease, border-color 0.4s ease;

        }

        

        .profile-img-container:hover .profile-img {

            transform: scale(1.08);

            border-color: #ff0000;

        }

        .profile-img-container:hover::before {

            transform: scale(1.15);

            box-shadow: 0 0 35px rgba(255, 0, 0, 0.9), 0 0 60px rgba(255, 0, 0, 0.4);

        }

        

        /* 💡 خط الاسم */

        h1 { 

            font-family: 'Orbitron', 'Cinzel', sans-serif;

            font-size: 2.1rem; 

            font-weight: 900; 

            margin-bottom: 15px; 

            color: #ffffff;

            letter-spacing: 2px;

            text-transform: uppercase;

        }

        

        @keyframes neonSignPulse {

            0%, 100% { text-shadow: 0 0 8px rgba(255, 0, 0, 0.6), 0 0 20px rgba(255, 0, 0, 0.3); opacity: 1; }

            50% { text-shadow: 0 0 18px rgba(255, 0, 0, 0.9), 0 0 40px rgba(255, 0, 0, 0.5); color: #ffffff; }

        }



        .brackets { font-family: 'Cinzel', serif; color: #ff0000; text-shadow: 0 0 10px #ff0000; }



        /* 📋 الكبسولة الجديدة الفخمة لـ "صانع محتوى" */

        .bio-container { 

            display: inline-flex; 

            align-items: center;

            justify-content: center;

            gap: 8px;

            margin: 0 auto 35px auto;

            border: 1px solid rgba(255, 0, 0, 0.4);

            padding: 6px 20px;

        .bio {

            color: #ffffff; 

            letter-spacing: 1px;

            text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);

        .bio-container i {

            color: #ff3333;

            font-size: 0.95rem;

            animation: firePulse 1s infinite alternate ease-in-out;

        }



        /* خط نيون سفلي مشدود تحت الكبسولة */

        .bio-container::after {

            content: '';

            position: absolute;

            bottom: -6px;

            left: 25%;

            width: 50%;

            height: 2px;

            background: #ff0000;

            border-radius: 2px;

            box-shadow: 0 0 8px #ff0000;

        }



        @keyframes badgeGlowPulse {

            0%, 100% { transform: scale(1); box-shadow: 0 0 10px rgba(255, 0, 0, 0.2); border-color: rgba(255, 0, 0, 0.4); }

            50% { transform: scale(1.02); box-shadow: 0 0 18px rgba(255, 0, 0, 0.4); border-color: rgba(255, 0, 0, 0.8); }

        }



        @keyframes firePulse {

            0% { transform: scale(1); text-shadow: 0 0 2px #ff0000; }

            100% { transform: scale(1.2); text-shadow: 0 0 8px #ff0000, 0 0 15px #ff0000; }

        }



        .links-container { display: flex; flex-direction: column; gap: 16px; width: 100%; }

        

        /* كروت التطبيقات */

        .link-card { 

            display: flex; 

            align-items: center; 

            justify-content: space-between; 

            padding: 16px 22px; 

            background: rgba(18, 18, 18, 0.85); 

            border: 1px solid rgba(255, 255, 255, 0.03); 

            border-radius: 14px; 

            color: #ffffff; 

            text-decoration: none; 

            font-weight: 700; 

            font-size: 1.05rem;

            opacity: 0;

            transform: translateY(25px);

            animation: cardFadeIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;

            transition: background 0.3s, box-shadow 0.3s, transform 0.2s; 

        }



        .link-card:nth-child(1) { animation-delay: 0.75s; }

        .link-card:nth-child(2) { animation-delay: 0.87s; }

        .link-card:nth-child(3) { animation-delay: 0.99s; }

        .link-card:nth-child(4) { animation-delay: 1.11s; }



        @keyframes cardFadeIn {

            to { opacity: 1; transform: translateY(0); }

        }

        

        .link-card:hover { 

            background: #ff0000; 

            box-shadow: 0 0 25px rgba(255, 0, 0, 0.5); 

            transform: scale(1.02); 

        }



        /* 📳 أنيميشن الهزة السريعة التفاعلية */

        .click-shake { animation: fastShake 0.2s ease-in-out 2; }

        @keyframes fastShake {

            0% { transform: translateX(0) scale(0.98); }

            25% { transform: translateX(-4px) rotate(-0.5deg); }

            75% { transform: translateX(4px) rotate(0.5deg); }

            100% { transform: translateX(0) scale(1); }

        }

        

        .link-content { display: flex; align-items: center; gap: 16px; text-align: right; }

        .link-content i { font-size: 1.65rem; width: 32px; text-align: center; }

        

        .text-info { display: flex; flex-direction: column; }

        .follower-count { font-size: 0.82rem; color: #ff3333; font-weight: bold; margin-top: 3px; }

        .link-card:hover .follower-count { color: #ffffff; }



        .arrow-icon { font-size: 0.95rem; opacity: 0.5; transition: transform 0.3s ease; }

        .link-card:hover .arrow-icon { transform: translateX(-6px); }



        .fa-instagram { color: #e1306c; } .fa-youtube { color: #ff0000; } .fa-tiktok { color: #00f2fe; } .fa-discord { color: #5865f2; }

        .link-card:hover i { color: #ffffff !important; }



        @media (max-width: 768px) {

            body { padding-top: 160px; overflow-y: auto; }

            .total-followers-box { top: 15px; right: 15px; width: calc(50% - 20px); padding: 8px; }

            .contact-info-box { top: 15px; left: 15px; width: calc(50% - 20px); padding: 8px; text-align: center; justify-content: center; }

            .contact-item { font-size: 0.75rem; justify-content: center; }

            .total-followers-box .count { font-size: 1.15rem; }

        }

    </style>

</head>

<body>

    <script>

        // الأجسام الطائرة عشوائياً في الخلفية

        function createParticles() {

            const container = document.getElementById('particlesContainer');

            const shapes = ['square', 'circle', 'triangle'];

            const maxParticles = 8;



            for (let i = 0; i < maxParticles; i++) {

                setTimeout(() => {

                    const particle = document.createElement('div');

                    particle.classList.add('particle');

                    const shape = shapes[Math.floor(Math.random() * shapes.length)];

                    const size = Math.floor(Math.random() * 18) + 12;

                    particle.style.width = `${size}px`;

                    particle.style.height = `${size}px`;

                    

                    if (shape === 'circle') particle.style.borderRadius = '50%';

                    else if (shape === 'triangle') {

                        particle.style.width = '0'; particle.style.height = '0';

                        particle.style.borderLeft = `${size/2}px solid transparent`;

                        particle.style.borderRight = `${size/2}px solid transparent`;

                        particle.style.borderBottom = `${size}px solid rgba(255, 0, 0, 0.35)`;

                        particle.style.borderTop = 'none'; particle.style.boxShadow = 'none'; particle.style.background = 'transparent';

                    }

                    particle.style.left = `${Math.random() * 100}vw`;

                    const duration = Math.random() * 4 + 8; 

                    particle.style.animationDuration = `${duration}s`;

                    container.appendChild(particle);

                    setTimeout(() => { particle.remove(); }, duration * 1000);

                }, Math.random() * 6000);

            }

        }



        document.addEventListener("DOMContentLoaded", () => {

            createParticles();

            setInterval(createParticles, 8000);



            // تشغيل حساب العدادات

            const counters = document.querySelectorAll('.counter');

            let totalFollowers = 0;



            counters.forEach(counter => {

                const target = +counter.getAttribute('data-target');

                totalFollowers += target;

                counter.innerText = target.toLocaleString();

            });



            document.getElementById('totalCounter').innerText = totalFollowers.toLocaleString();



            // تطبيق الهزة والتحويل الآمن عند الضغط

            const links = document.querySelectorAll('.link-card');

            links.forEach(link => {

                link.addEventListener('click', function(e) {

                    e.preventDefault();

                    const href = this.getAttribute('href');

                    this.classList.add('click-shake');

                    setTimeout(() => {

                        this.classList.remove('click-shake');

                        window.open(href, '_blank');

                    }, 220);

                });

            });

        });

    </script>
