<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIKOVAX3.0 | My Accounts</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@800;900&family=Cinzel:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #020202, #0d0000, #050505, #140000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-start;
            font-family: 'Cairo', sans-serif;
            padding: 1.5rem;
            padding-bottom: 140px;
            position: relative;
            color: #ffffff;
            overflow-x: hidden;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* تعديلات لتناسب المحاذاة الجديدة */
        .total-followers-box, .contact-info-box {
            position: relative;
            margin-bottom: 20px;
            background: rgba(10, 10, 10, 0.85);
            border: 1px solid rgba(255, 0, 0, 0.3);
            padding: 12px 22px;
            border-radius: 12px;
            backdrop-filter: blur(8px);
        }

        .player-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 260px;
            background: rgba(15, 2, 2, 0.85);
            border: 1px solid rgba(255, 0, 0, 0.4);
            border-radius: 14px;
            padding: 12px 18px;
            z-index: 100;
        }

        /* بقية التنسيقات (تأثيرات النيون، الأزرار، إلخ) */
        .track-name { font-family: 'Orbitron', sans-serif; color: #ff3333; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .progress-bar-container { width: 100%; height: 5px; background: #222; border-radius: 3px; cursor: pointer; margin-top: 8px; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #660000, #ff0000); border-radius: 3px; }
        .play-inset-btn { cursor: pointer; color: #ff0000; }
        .container { width: 100%; max-width: 440px; background: rgba(8, 8, 8, 0.9); padding: 40px 25px; border-radius: 24px; border: 1px solid rgba(255, 0, 0, 0.25); }
        .profile-img-container { width: 135px; height: 135px; margin-bottom: 20px; position: relative; }
        .profile-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .link-card { display: flex; align-items: center; justify-content: space-between; padding: 16px 22px; background: rgba(18, 18, 18, 0.85); border: 1px solid rgba(255, 0, 0, 0.15); border-radius: 14px; margin-bottom: 12px; color: #ffffff; text-decoration: none; }
        .link-card:hover { background: #ff0000; }
    </style>
</head>
<body>

    <div class="total-followers-box">
        <span class="title">Total Followers</span>
        <span class="count" id="totalCounter">0</span>
    </div>

    <div class="contact-info-box">
        <a href="mailto:nikovax30@gmail.com" class="contact-item"><i class="fas fa-envelope"></i> nikovax30@gmail.com</a>
    </div>

    <div class="container">
        <div class="profile-img-container">
            <img src="https://cdn.discordapp.com/attachments/1418196235218845789/1523130991407792178/4g4_1.jpg?ex=6a4afdc6&is=6a49ac46&hm=4cb9cc87e47ca91c19e68d1bff995a6dfbf897633ffd6e64d5d38d72379cf3bb&" alt="Profile" class="profile-img">
        </div>
        <h1>NIKOVAX 3.0</h1>
        <div class="links-container">
            <a href="#" class="link-card"><span>Instagram</span></a>
            <a href="#" class="link-card"><span>YouTube</span></a>
        </div>
    </div>

    <div class="player-container" id="playerWrap">
        <div class="track-name">
            <i class="fas fa-play play-inset-btn" id="insetPlayIcon" onclick="toggleMusic()"></i> 
            DEATH NOTE OST
        </div>
        <div class="progress-bar-container" id="progressContainer">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <audio id="bgMusic" src="deathnote.mp3" loop></audio>

    <script>
        const myAudio = document.getElementById("bgMusic");
        const insetPlayIcon = document.getElementById("insetPlayIcon");
        const progressFill = document.getElementById("progressFill");

        function toggleMusic() {
            if (myAudio.paused) {
                myAudio.play();
                insetPlayIcon.className = "fas fa-pause play-inset-btn";
            } else {
                myAudio.pause();
                insetPlayIcon.className = "fas fa-play play-inset-btn";
            }
        }

        myAudio.addEventListener("timeupdate", () => {
            const progress = (myAudio.currentTime / myAudio.duration) * 100;
            progressFill.style.width = `${progress}%`;
        });
    </script>
</body>
</html>
